<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · RDAP Not Found</title>
    <meta name="robots" content="noindex, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .error-code { font-size: 6rem; font-weight: 700; color: #10b981; }
        h1 { color: white; margin: 1rem 0; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
        }
        .btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <div class="error-code">404</div>
        <h1>RDAP Record Not Found</h1>
        <p>The registration data you're looking for doesn't exist or isn't available via RDAP.</p>
        <a href="/" class="btn">← Back to RDAP Inspector</a>
    </div>
</body>
</html>
